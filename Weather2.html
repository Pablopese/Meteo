<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Panel del Tiempo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      background: #16213e;
    }

    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #animacion {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .gota {
      position: absolute;
      top: -20px;
      width: 2px; height: 15px;
      background: rgba(174,214,241,0.5);
      border-radius: 2px;
      animation: caerGota linear infinite;
    }

    @keyframes caerGota { to { transform: translateY(110vh); } }

    .copo {
      position: absolute;
      top: -20px;
      color: rgba(255,255,255,0.8);
      animation: caerNieve linear infinite;
    }

    @keyframes caerNieve { to { transform: translateY(110vh) rotate(360deg); } }

    .flash {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white; opacity: 0;
      animation: relampago 5s infinite;
    }

    @keyframes relampago {
      0%, 92%, 100% { opacity: 0; }
      93%, 95% { opacity: 0.15; }
      94% { opacity: 0; }
    }

    /* ── LAYOUT SIEMPRE DOS COLUMNAS ── */
    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100svh;
      padding: 2vh 2vw;
      gap: 2vw;
      transition: opacity 0.4s ease;
    }

    .layout.fade-out { opacity: 0; }

    .col-izquierda {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      height: 100%;
    }

    .cuadrante-superior {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .cuadrante-inferior {
      width: 100%;
    }

    .col-derecha {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
    }

    /* Selector ciudades */
    .ciudades-selector {
      display: flex;
      gap: 0.8vw;
      margin-bottom: 1.5vh;
    }

    .ciudad-pill {
      padding: 0.4vh 1.2vw;
      border-radius: 15px;
      font-size: clamp(0.6rem, 1vw, 1rem);
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.35;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .ciudad-pill.activa {
      opacity: 1;
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
    }

    #ciudad {
      font-size: clamp(1rem, 2.5vw, 2.2rem);
      opacity: 0.7;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.5vh;
    }

    #hora {
      font-size: clamp(2.5rem, 9vw, 7rem);
      font-weight: bold;
      letter-spacing: 2px;
      line-height: 1;
    }

    #fecha {
      font-size: clamp(0.75rem, 1.5vw, 1.3rem);
      opacity: 0.6;
      margin-bottom: 1.5vh;
    }

    /* Sol */
    .sol-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1vw;
      width: 100%;
    }

    .sol-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 1vh 0.5vw;
      gap: 0.3vh;
    }

    .sol-card span:first-child {
      font-size: clamp(0.55rem, 0.9vw, 0.85rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .sol-card span:last-child {
      font-size: clamp(0.9rem, 1.5vw, 1.3rem);
      font-weight: bold;
    }

    /* Previsión diaria */
    .prevision-diaria {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5vh 0.5vw;
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
    }

    .dia-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4vh;
    }

    .dia-nombre {
      font-size: clamp(0.6rem, 1vw, 0.9rem);
      opacity: 0.6;
      text-transform: capitalize;
      text-align: center;
    }

    .dia-icono { font-size: clamp(1.2rem, 2.5vw, 2.2rem); line-height: 1.2; }

    .dia-temps {
      font-size: clamp(0.75rem, 1.2vw, 1.1rem);
      font-weight: bold;
      text-align: center;
    }

    .dia-temps .min {
      display: block;
      opacity: 0.5;
      font-weight: normal;
      font-size: 0.88em;
    }

    /* Contenedor derecha */
    .contenedor-tiempo {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 1.5vh;
    }

    .tarjeta-tiempo {
      width: 100%;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 2vh 2vw;
      gap: 1.5vh;
    }

    .tiempo-actual {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    .tarjeta-izquierda {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8vh;
    }

    #icono { font-size: clamp(3rem, 8vw, 7rem); line-height: 1; }

    #descripcion {
      font-size: clamp(0.75rem, 1.3vw, 1.1rem);
      opacity: 0.8;
      text-transform: capitalize;
      text-align: center;
    }

    #temperatura {
      font-size: clamp(3rem, 9vw, 7.5rem);
      font-weight: 300;
      line-height: 1;
    }

    .separador {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .prevision {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 0.5vw;
    }

    .franja {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3vh;
    }

    .franja-hora {
      font-size: clamp(0.6rem, 1vw, 0.9rem);
      opacity: 0.5;
      letter-spacing: 1px;
    }

    .franja-icono { font-size: clamp(1.2rem, 2.5vw, 2rem); line-height: 1.2; }
    .franja-temp { font-size: clamp(0.85rem, 1.3vw, 1.1rem); font-weight: bold; }

    /* Grid detalles */
    .detalles {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1vw;
    }

    .detalle {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 1vh 0.5vw;
      gap: 0.3vh;
    }

    .detalle span:first-child {
      font-size: clamp(0.55rem, 0.9vw, 0.8rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .detalle span:nth-child(2) {
      font-size: clamp(0.9rem, 1.8vw, 1.5rem);
      font-weight: bold;
    }

    .detalle span:nth-child(3) {
      font-size: clamp(0.7rem, 1.1vw, 0.95rem);
      opacity: 0.7;
    }

    #ultima-actualizacion {
      position: fixed;
      bottom: 1.5vh;
      right: 1.5vw;
      font-size: clamp(0.55rem, 0.8vw, 0.75rem);
      opacity: 0.3;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div id="animacion"></div>

  <div class="layout">

    <div class="col-izquierda">
      <div class="cuadrante-superior">
        <div class="ciudades-selector">
          <span class="ciudad-pill activa" id="pill-merida" onclick="cambiarCiudad('merida')">Mérida</span>
          <span class="ciudad-pill" id="pill-caceres" onclick="cambiarCiudad('caceres')">Cáceres</span>
        </div>
        <div id="ciudad">Mérida</div>
        <div id="hora">--:--</div>
        <div id="fecha">--</div>
        <div class="sol-cards">
          <div class="sol-card"><span>Amanecer</span><span id="amanecer">--:--</span></div>
          <div class="sol-card"><span>Atardecer</span><span id="atardecer">--:--</span></div>
        </div>
      </div>

      <div class="cuadrante-inferior">
        <div class="prevision-diaria"></div>
      </div>
    </div>

    <div class="col-derecha">
      <div class="contenedor-tiempo">

        <div class="tarjeta-tiempo">
          <div class="tiempo-actual">
            <div class="tarjeta-izquierda">
              <i id="icono" class="wi wi-na"></i>
              <div id="descripcion">Cargando...</div>
            </div>
            <div id="temperatura">--°</div>
          </div>
          <div class="separador"></div>
          <div class="prevision"></div>
        </div>

        <div class="detalles">
          <div class="detalle"><span>Humedad</span><span id="humedad">--%</span></div>
          <div class="detalle"><span>Viento</span><span id="viento">-- km/h</span></div>
          <div class="detalle"><span>Sensación</span><span id="sensacion">--°</span></div>
          <div class="detalle"><span>Presión</span><span id="presion">-- hPa</span></div>
          <div class="detalle"><span>Polen</span><span id="polen-valor">--</span></div>
          <div class="detalle"><span>UV</span><span id="uv-valor">--</span><span id="uv-label">--</span></div>
        </div>

      </div>
    </div>

  </div>

  <div id="ultima-actualizacion">Actualizando...</div>

  <script>
    const API_KEY = '200d7683a1565e363b0b2e6ca5496e01';
    const GOOGLE_KEY = 'AIzaSyAubTqmFTe-pZiyJ61ddvvm8BQGRe0mknY';

    const CIUDADES = {
      merida:  { nombre: 'Mérida',  lat: 38.9166, lon: -6.3441 },
      caceres: { nombre: 'Cáceres', lat: 39.4753, lon: -6.3724 }
    };
    let ciudadActual = 'merida';
    let cambiando = false;

    const mapaIconos = {
      '01d': 'wi-day-sunny',       '01n': 'wi-night-clear',
      '02d': 'wi-day-cloudy',      '02n': 'wi-night-alt-cloudy',
      '03d': 'wi-cloud',           '03n': 'wi-cloud',
      '04d': 'wi-cloudy',          '04n': 'wi-cloudy',
      '09d': 'wi-showers',         '09n': 'wi-showers',
      '10d': 'wi-day-rain',        '10n': 'wi-night-alt-rain',
      '11d': 'wi-thunderstorm',    '11n': 'wi-thunderstorm',
      '13d': 'wi-snow',            '13n': 'wi-snow',
      '50d': 'wi-fog',             '50n': 'wi-fog'
    };

    function icono(codigo) { return mapaIconos[codigo] || 'wi-na'; }

    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) > 80) {
        cambiarCiudad(ciudadActual === 'merida' ? 'caceres' : 'merida');
      }
    }, { passive: true });

    async function cambiarCiudad(nueva) {
      if (nueva === ciudadActual || cambiando) return;
      cambiando = true;
      const layout = document.querySelector('.layout');
      layout.classList.add('fade-out');
      await new Promise(r => setTimeout(r, 380));
      ciudadActual = nueva;
      document.getElementById('ciudad').textContent = CIUDADES[ciudadActual].nombre;
      document.querySelectorAll('.ciudad-pill').forEach(p => p.classList.remove('activa'));
      document.getElementById('pill-' + ciudadActual).classList.add('activa');
      await Promise.all([obtenerTiempoYPrevision(), obtenerUV(), obtenerPolen()]);
      layout.classList.remove('fade-out');
      cambiando = false;
    }

    function actualizarFondo(condicion, cod) {
      const esNoche = cod.includes('n');
      const id = condicion;
      let g;
      if (esNoche)              g = 'linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%)';
      else if (id < 300)        g = 'linear-gradient(135deg, #1a1a2e 0%, #2d3561 50%, #1a1a2e 100%)';
      else if (id < 600)        g = 'linear-gradient(135deg, #2c3e50 0%, #3498db 100%)';
      else if (id < 700)        g = 'linear-gradient(135deg, #e0e0e0 0%, #b0c4de 50%, #a8c0d6 100%)';
      else if (id < 800)        g = 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)';
      else if (id === 800)      g = 'linear-gradient(135deg, #1a6fa8 0%, #2e9fd4 50%, #87ceeb 100%)';
      else if (id <= 802)       g = 'linear-gradient(135deg, #1c3a5e 0%, #4a7fa5 100%)';
      else                      g = 'linear-gradient(135deg, #2c3e50 0%, #4a5568 100%)';
      document.body.style.backgroundImage = g;
      iniciarAnimacion(id);
    }

    function iniciarAnimacion(id) {
      const cont = document.getElementById('animacion');
      cont.innerHTML = '';
      if (id >= 200 && id < 300) {
        const flash = document.createElement('div');
        flash.className = 'flash';
        cont.appendChild(flash);
        crearGotas(cont, 40);
      } else if (id >= 300 && id < 600) {
        crearGotas(cont, id >= 500 ? 50 : 25);
      } else if (id >= 600 && id < 700) {
        crearCopos(cont, 30);
      }
    }

    function crearGotas(cont, n) {
      for (let i = 0; i < n; i++) {
        const g = document.createElement('div');
        g.className = 'gota';
        g.style.left = (Math.random() * 100) + 'vw';
        g.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
        g.style.animationDelay = (Math.random() * 2) + 's';
        g.style.opacity = (Math.random() * 0.4 + 0.3).toString();
        cont.appendChild(g);
      }
    }

    function crearCopos(cont, n) {
      for (let i = 0; i < n; i++) {
        const c = document.createElement('div');
        c.className = 'copo';
        c.textContent = '❄';
        c.style.left = (Math.random() * 100) + 'vw';
        c.style.animationDuration = (Math.random() * 3 + 2) + 's';
        c.style.animationDelay = (Math.random() * 3) + 's';
        c.style.fontSize = (Math.random() * 8 + 8) + 'px';
        cont.appendChild(c);
      }
    }

    function actualizarReloj() {
      const ahora = new Date();
      document.getElementById('hora').textContent =
        ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fecha').textContent =
        ahora.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    async function obtenerPolen() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://pollen.googleapis.com/v1/forecast:lookup?key=${GOOGLE_KEY}&location.longitude=${lon}&location.latitude=${lat}&days=1`;
        const resp = await fetch(url);
        const datos = await resp.json();
        const tipos = datos.dailyInfo[0].pollenTypeInfo;
        const conDatos = tipos.filter(t => t.indexInfo && t.indexInfo.value > 0);
        const maxValor = conDatos.length ? Math.max(...conDatos.map(t => t.indexInfo.value)) : 0;
        const cats = {0: 'Muy bajo', 1: 'Muy bajo', 2: 'Bajo', 3: 'Moderado', 4: 'Alto', 5: 'Muy alto'};
        document.getElementById('polen-valor').textContent = cats[maxValor] || '--';
      } catch(e) {
        document.getElementById('polen-valor').textContent = 'N/D';
      }
    }

    async function obtenerUV() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`;
        const resp = await fetch(url);
        const datos = await resp.json();
        const valor = datos.value;
        const etiqueta = valor <= 2 ? 'Bajo' : valor <= 5 ? 'Moderado' : valor <= 7 ? 'Alto' : valor <= 10 ? 'Muy alto' : 'Extremo';
        document.getElementById('uv-valor').textContent = valor;
        document.getElementById('uv-label').textContent = etiqueta;
      } catch(e) {
        document.getElementById('uv-valor').textContent = 'N/D';
        document.getElementById('uv-label').textContent = '';
      }
    }

    async function obtenerTiempoYPrevision() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${API_KEY}`;
        const resp = await fetch(url);
        const datos = await resp.json();

        const actual = datos.list[0];
        document.getElementById('temperatura').textContent = Math.round(actual.main.temp) + '°';
        document.getElementById('descripcion').textContent = actual.weather[0].description;
        document.getElementById('humedad').textContent = actual.main.humidity + '%';
        document.getElementById('viento').textContent = Math.round(actual.wind.speed * 3.6) + ' km/h';
        document.getElementById('sensacion').textContent = Math.round(actual.main.feels_like) + '°';
        document.getElementById('presion').textContent = actual.main.pressure + ' hPa';
        document.getElementById('icono').className = `wi ${icono(actual.weather[0].icon)}`;
        actualizarFondo(actual.weather[0].id, actual.weather[0].icon);

        document.getElementById('amanecer').textContent =
          new Date(datos.city.sunrise * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('atardecer').textContent =
          new Date(datos.city.sunset * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        const contHoras = document.querySelector('.prevision');
        contHoras.innerHTML = '';
        datos.list.slice(1, 4).forEach(f => {
          const hora = new Date(f.dt * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
          contHoras.innerHTML += `
            <div class="franja">
              <span class="franja-hora">${hora}</span>
              <i class="wi ${icono(f.weather[0].icon)} franja-icono"></i>
              <span class="franja-temp">${Math.round(f.main.temp)}°</span>
            </div>`;
        });

        const hoy = new Date().toDateString();
        const porDia = {};
        datos.list.forEach(item => {
          const fecha = new Date(item.dt * 1000);
          const key = fecha.toDateString();
          if (key === hoy) return;
          if (!porDia[key]) porDia[key] = {
            nombre: fecha.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' }),
            temps: [], iconos: []
          };
          porDia[key].temps.push(item.main.temp);
          porDia[key].iconos.push(item.weather[0].icon);
        });

        const contDiario = document.querySelector('.prevision-diaria');
        contDiario.innerHTML = '';
        Object.values(porDia).slice(0, 4).forEach(dia => {
          const max = Math.round(Math.max(...dia.temps));
          const min = Math.round(Math.min(...dia.temps));
          const cod = dia.iconos[Math.floor(dia.iconos.length / 2)];
          contDiario.innerHTML += `
            <div class="dia-card">
              <span class="dia-nombre">${dia.nombre}</span>
              <i class="wi ${icono(cod)} dia-icono"></i>
              <span class="dia-temps">${max}°<span class="min">${min}°</span></span>
            </div>`;
        });

        document.getElementById('ultima-actualizacion').textContent =
          'Actualizado: ' + new Date().toLocaleTimeString('es-ES');

      } catch (error) {
        document.getElementById('descripcion').textContent = 'Error de conexión';
      }
    }

    obtenerTiempoYPrevision();
    obtenerPolen();
    obtenerUV();
    setInterval(obtenerTiempoYPrevision, 10 * 60 * 1000);
    setInterval(obtenerPolen, 60 * 60 * 1000);
    setInterval(obtenerUV, 60 * 60 * 1000);
  </script>

</body>
</html>
