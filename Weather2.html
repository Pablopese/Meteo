<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Panel del Tiempo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #16213e;
      overflow: hidden;
      width: 100vw;
    }

    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100svh;
      width: 100vw;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Animación */
    #animacion {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .gota {
      position: absolute;
      top: -20px;
      width: 2px; height: 15px;
      background: rgba(174,214,241,0.5);
      border-radius: 2px;
      animation: caerGota linear infinite;
    }

    @keyframes caerGota { to { transform: translateY(110vh); } }

    .copo {
      position: absolute;
      top: -20px;
      color: rgba(255,255,255,0.8);
      animation: caerNieve linear infinite;
    }

    @keyframes caerNieve { to { transform: translateY(110vh) rotate(360deg); } }

    .flash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      opacity: 0;
      animation: relampago 5s infinite;
    }

    @keyframes relampago {
      0%, 92%, 100% { opacity: 0; }
      93%, 95% { opacity: 0.15; }
      94% { opacity: 0; }
    }

    /* Layout */
    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 20px;
      gap: 15px;
      align-items: center;
    }

    /* Columna izquierda */
    .col-izquierda {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }

    .cuadrante-superior {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .cuadrante-inferior {
      width: 100%;
    }

    /* Columna derecha */
    .col-derecha {
      width: 100%;
      max-width: 400px;
    }

    /* Botón */
    #btn-ciudad {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.85em;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.3s;
    }

    #btn-ciudad:hover { background: rgba(255,255,255,0.2); }

    #ciudad {
      font-size: 1.8em;
      opacity: 0.7;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #hora {
      font-size: 5em;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #fecha {
      font-size: 1.1em;
      opacity: 0.6;
      margin-bottom: 12px;
    }

    /* Sol cards */
    .sol-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .sol-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 5px;
      gap: 4px;
    }

    .sol-card span:first-child {
      font-size: 0.7em;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .sol-card span:last-child {
      font-size: 1.1em;
      font-weight: bold;
    }

    /* Previsión diaria */
    .prevision-diaria {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .dia-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 15px;
    }

    .dia-nombre {
      font-size: 0.9em;
      opacity: 0.7;
      width: 80px;
      text-transform: capitalize;
    }

    .dia-icono { width: 34px; height: 34px; }

    .dia-temps { font-size: 0.95em; font-weight: bold; }

    .dia-temps .min {
      opacity: 0.5;
      font-weight: normal;
      margin-left: 8px;
      font-size: 0.9em;
    }

    /* Contenedor tiempo derecha */
    .contenedor-tiempo {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 12px;
    }

    .tarjeta-tiempo {
      width: 100%;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 15px 20px;
      gap: 12px;
    }

    .tiempo-actual {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    .tarjeta-izquierda {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    #icono { width: 70px; height: 70px; }

    #descripcion {
      font-size: 0.95em;
      opacity: 0.8;
      text-transform: capitalize;
      text-align: center;
    }

    #temperatura {
      font-size: 5em;
      font-weight: 300;
      line-height: 1;
    }

    .separador {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .prevision {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 8px;
    }

    .franja {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .franja-hora {
      font-size: 0.72em;
      opacity: 0.5;
      letter-spacing: 1px;
    }

    .franja-icono { width: 34px; height: 34px; }

    .franja-temp {
      font-size: 1em;
      font-weight: bold;
    }

    /* Grid detalles */
    .detalles {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .detalle {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 5px;
      gap: 4px;
    }

    .detalle span:first-child {
      font-size: 0.7em;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .detalle span:nth-child(2) {
      font-size: 1.2em;
      font-weight: bold;
    }

    .detalle span:nth-child(3) {
      font-size: 0.85em;
      opacity: 0.7;
    }

    #ultima-actualizacion {
      position: fixed;
      bottom: 15px;
      right: 20px;
      font-size: 0.7em;
      opacity: 0.3;
      z-index: 2;
    }

    /* Landscape: dos columnas */
    @media (orientation: landscape) {
      .layout {
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        padding: 15px 30px;
        gap: 25px;
        max-width: 960px;
        margin: 0 auto;
      }

      .col-izquierda {
        flex: 1;
        max-width: 340px;
        justify-content: space-between;
      }

      .cuadrante-superior {
        align-items: center;
      }

      .col-derecha {
        flex: 1;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      #hora { font-size: 3.2em; }
      #ciudad { font-size: 1.3em; }
      #fecha { font-size: 0.95em; margin-bottom: 10px; }
      #temperatura { font-size: 4em; }
      #icono { width: 58px; height: 58px; }
      .sol-card span:last-child { font-size: 1em; }
    }
  </style>
</head>
<body>

  <div id="animacion"></div>

  <div class="layout">

    <!-- Columna izquierda -->
    <div class="col-izquierda">

      <div class="cuadrante-superior">
        <button id="btn-ciudad" onclick="cambiarCiudad()">Cáceres</button>
        <div id="ciudad">Mérida</div>
        <div id="hora">--:--</div>
        <div id="fecha">--</div>
        <div class="sol-cards">
          <div class="sol-card"><span>Amanecer</span><span id="amanecer">--:--</span></div>
          <div class="sol-card"><span>Atardecer</span><span id="atardecer">--:--</span></div>
        </div>
      </div>

      <div class="cuadrante-inferior">
        <div class="prevision-diaria"></div>
      </div>

    </div>

    <!-- Columna derecha -->
    <div class="col-derecha">
      <div class="contenedor-tiempo">

        <div class="tarjeta-tiempo">
          <div class="tiempo-actual">
            <div class="tarjeta-izquierda">
              <img id="icono" src="" alt="icono">
              <div id="descripcion">Cargando...</div>
            </div>
            <div id="temperatura">--°</div>
          </div>
          <div class="separador"></div>
          <div class="prevision"></div>
        </div>

        <div class="detalles">
          <div class="detalle"><span>Humedad</span><span id="humedad">--%</span></div>
          <div class="detalle"><span>Viento</span><span id="viento">-- km/h</span></div>
          <div class="detalle"><span>Sensación</span><span id="sensacion">--°</span></div>
          <div class="detalle"><span>Presión</span><span id="presion">-- hPa</span></div>
          <div class="detalle"><span>Polen</span><span id="polen-valor">--</span></div>
          <div class="detalle"><span>UV</span><span id="uv-valor">--</span><span id="uv-label">--</span></div>
        </div>

      </div>
    </div>

  </div>

  <div id="ultima-actualizacion">Actualizando...</div>

  <script>
    const API_KEY = '200d7683a1565e363b0b2e6ca5496e01';
    const GOOGLE_KEY = 'AIzaSyAubTqmFTe-pZiyJ61ddvvm8BQGRe0mknY';

    const CIUDADES = {
      merida:  { nombre: 'Mérida',  lat: 38.9166, lon: -6.3441 },
      caceres: { nombre: 'Cáceres', lat: 39.4753, lon: -6.3724 }
    };
    let ciudadActual = 'merida';

    function cambiarCiudad() {
      ciudadActual = ciudadActual === 'merida' ? 'caceres' : 'merida';
      document.getElementById('ciudad').textContent = CIUDADES[ciudadActual].nombre;
      document.getElementById('btn-ciudad').textContent =
        ciudadActual === 'merida' ? 'Cáceres' : 'Mérida';
      obtenerTiempoYPrevision();
      obtenerUV();
      obtenerPolen();
    }

    function actualizarFondo(condicion, icono) {
      const esNoche = icono.includes('n');
      const id = condicion;
      let gradiente;
      if (esNoche) {
        gradiente = 'linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%)';
      } else if (id >= 200 && id < 300) {
        gradiente = 'linear-gradient(135deg, #1a1a2e 0%, #2d3561 50%, #1a1a2e 100%)';
      } else if (id >= 300 && id < 600) {
        gradiente = 'linear-gradient(135deg, #2c3e50 0%, #3498db 100%)';
      } else if (id >= 600 && id < 700) {
        gradiente = 'linear-gradient(135deg, #e0e0e0 0%, #b0c4de 50%, #a8c0d6 100%)';
      } else if (id >= 700 && id < 800) {
        gradiente = 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)';
      } else if (id === 800) {
        gradiente = 'linear-gradient(135deg, #1a6fa8 0%, #2e9fd4 50%, #87ceeb 100%)';
      } else if (id === 801 || id === 802) {
        gradiente = 'linear-gradient(135deg, #1c3a5e 0%, #4a7fa5 100%)';
      } else {
        gradiente = 'linear-gradient(135deg, #2c3e50 0%, #4a5568 100%)';
      }
      document.body.style.backgroundImage = gradiente;
      iniciarAnimacion(id);
    }

    function iniciarAnimacion(id) {
      const cont = document.getElementById('animacion');
      cont.innerHTML = '';
      if (id >= 200 && id < 300) {
        const flash = document.createElement('div');
        flash.className = 'flash';
        cont.appendChild(flash);
        crearGotas(cont, 40);
      } else if (id >= 300 && id < 600) {
        crearGotas(cont, id >= 500 ? 50 : 25);
      } else if (id >= 600 && id < 700) {
        crearCopos(cont, 30);
      }
    }

    function crearGotas(cont, cantidad) {
      for (let i = 0; i < cantidad; i++) {
        const g = document.createElement('div');
        g.className = 'gota';
        g.style.left = (Math.random() * 100) + 'vw';
        g.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
        g.style.animationDelay = (Math.random() * 2) + 's';
        g.style.opacity = (Math.random() * 0.4 + 0.3).toString();
        cont.appendChild(g);
      }
    }

    function crearCopos(cont, cantidad) {
      for (let i = 0; i < cantidad; i++) {
        const c = document.createElement('div');
        c.className = 'copo';
        c.textContent = '❄';
        c.style.left = (Math.random() * 100) + 'vw';
        c.style.animationDuration = (Math.random() * 3 + 2) + 's';
        c.style.animationDelay = (Math.random() * 3) + 's';
        c.style.fontSize = (Math.random() * 8 + 8) + 'px';
        cont.appendChild(c);
      }
    }

    function actualizarReloj() {
      const ahora = new Date();
      document.getElementById('hora').textContent =
        ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fecha').textContent =
        ahora.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    async function obtenerPolen() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://pollen.googleapis.com/v1/forecast:lookup?key=${GOOGLE_KEY}&location.longitude=${lon}&location.latitude=${lat}&days=1`;
        const resp = await fetch(url);
        const datos = await resp.json();
        const tipos = datos.dailyInfo[0].pollenTypeInfo;
        const conDatos = tipos.filter(t => t.indexInfo && t.indexInfo.value > 0);
        if (conDatos.length === 0) {
          document.getElementById('polen-valor').textContent = 'Muy bajo';
          return;
        }
        const maxValor = Math.max(...conDatos.map(t => t.indexInfo.value));
        const categorias = {1: 'Muy bajo', 2: 'Bajo', 3: 'Moderado', 4: 'Alto', 5: 'Muy alto'};
        document.getElementById('polen-valor').textContent = categorias[maxValor] || '--';
      } catch(e) {
        document.getElementById('polen-valor').textContent = 'N/D';
      }
    }

    async function obtenerUV() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`;
        const resp = await fetch(url);
        const datos = await resp.json();
        const valor = datos.value;
        let etiqueta;
        if (valor <= 2) etiqueta = 'Bajo';
        else if (valor <= 5) etiqueta = 'Moderado';
        else if (valor <= 7) etiqueta = 'Alto';
        else if (valor <= 10) etiqueta = 'Muy alto';
        else etiqueta = 'Extremo';
        document.getElementById('uv-valor').textContent = valor;
        document.getElementById('uv-label').textContent = etiqueta;
      } catch(e) {
        document.getElementById('uv-valor').textContent = 'N/D';
        document.getElementById('uv-label').textContent = '';
      }
    }

    async function obtenerTiempoYPrevision() {
      const { lat, lon } = CIUDADES[ciudadActual];
      try {
        const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${API_KEY}`;
        const resp = await fetch(url);
        const datos = await resp.json();

        // Tiempo actual
        const actual = datos.list[0];
        document.getElementById('temperatura').textContent = Math.round(actual.main.temp) + '°';
        document.getElementById('descripcion').textContent = actual.weather[0].description;
        document.getElementById('humedad').textContent = actual.main.humidity + '%';
        document.getElementById('viento').textContent = Math.round(actual.wind.speed * 3.6) + ' km/h';
        document.getElementById('sensacion').textContent = Math.round(actual.main.feels_like) + '°';
        document.getElementById('presion').textContent = actual.main.pressure + ' hPa';
        document.getElementById('icono').src = `https://openweathermap.org/img/wn/${actual.weather[0].icon}@2x.png`;
        actualizarFondo(actual.weather[0].id, actual.weather[0].icon);

        // Amanecer / Atardecer
        document.getElementById('amanecer').textContent =
          new Date(datos.city.sunrise * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('atardecer').textContent =
          new Date(datos.city.sunset * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        // Previsión horaria (+3h, +6h, +9h)
        const contHoras = document.querySelector('.prevision');
        contHoras.innerHTML = '';
        datos.list.slice(1, 4).forEach(f => {
          const hora = new Date(f.dt * 1000).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
          contHoras.innerHTML += `
            <div class="franja">
              <span class="franja-hora">${hora}</span>
              <img class="franja-icono" src="https://openweathermap.org/img/wn/${f.weather[0].icon}@2x.png" alt="">
              <span class="franja-temp">${Math.round(f.main.temp)}°</span>
            </div>`;
        });

        // Previsión diaria (próximos 4 días)
        const hoy = new Date().toDateString();
        const porDia = {};
        datos.list.forEach(item => {
          const fecha = new Date(item.dt * 1000);
          const key = fecha.toDateString();
          if (key === hoy) return;
          if (!porDia[key]) porDia[key] = {
            nombre: fecha.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' }),
            temps: [], iconos: []
          };
          porDia[key].temps.push(item.main.temp);
          porDia[key].iconos.push(item.weather[0].icon);
        });

        const contDiario = document.querySelector('.prevision-diaria');
        contDiario.innerHTML = '';
        Object.values(porDia).slice(0, 4).forEach(dia => {
          const max = Math.round(Math.max(...dia.temps));
          const min = Math.round(Math.min(...dia.temps));
          const icono = dia.iconos[Math.floor(dia.iconos.length / 2)];
          contDiario.innerHTML += `
            <div class="dia-card">
              <span class="dia-nombre">${dia.nombre}</span>
              <img class="dia-icono" src="https://openweathermap.org/img/wn/${icono}@2x.png" alt="">
              <span class="dia-temps">${max}° <span class="min">${min}°</span></span>
            </div>`;
        });

        document.getElementById('ultima-actualizacion').textContent =
          'Actualizado: ' + new Date().toLocaleTimeString('es-ES');

      } catch (error) {
        document.getElementById('descripcion').textContent = 'Error de conexión';
      }
    }

    obtenerTiempoYPrevision();
    obtenerPolen();
    obtenerUV();
    setInterval(obtenerTiempoYPrevision, 10 * 60 * 1000);
    setInterval(obtenerPolen, 60 * 60 * 1000);
    setInterval(obtenerUV, 60 * 60 * 1000);
  </script>

</body>
</html>
