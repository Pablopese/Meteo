
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Tiempo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #16213e;
      overflow: hidden;
       width: 100vw;
    }

    body {
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%);
  min-height: 100svh;
  width: 100vw;          /* ←  esta línea falta */
  color: white;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}


    #ciudad {
      font-size: 1.8em;
      opacity: 0.7;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #hora {
      font-size: 5em;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #fecha {
      font-size: 1.2em;
      opacity: 0.6;
      margin-bottom: 30px;
    }

    .tarjeta-tiempo {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 15px 25px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 15px;
  gap: 20px;
}

.tarjeta-izquierda {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

#icono {
  width: 70px;
  height: 70px;
}

#descripcion {
  font-size: 0.95em;
  opacity: 0.8;
  text-transform: capitalize;
  text-align: center;
}

#temperatura {
  font-size: 5em;
  font-weight: 300;
  line-height: 1;
}


    .detalles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 20px;
      width: 100%;
      max-width: 400px;
      margin-top: 15px;
    }

    .detalle {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 5px;
      gap: 4px;
    }

    .detalle span:first-child {
      font-size: 0.7em;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .detalle span:last-child {
      font-size: 1.2em;
      font-weight: bold;
    }

    #ultima-actualizacion {
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-size: 0.7em;
      opacity: 0.3;
    }

    @media (orientation: landscape) {
      body {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-around;
        padding: 10px 40px;
      }

      .bloque-izquierda {
        flex: 0.7;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .bloque-derecha {
        flex: 1.3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      #hora { font-size: 3em; }
      #ciudad { font-size: 1.4em; }
      #fecha { font-size: 1em; }
      #temperatura { font-size: 5em; }
      #icono { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

  <div class="bloque-izquierda">
    <div id="ciudad">Mérida</div>
    <div id="hora">--:--</div>
    <div id="fecha">--</div>
  </div>

  <div class="bloque-derecha">
  <!-- Reemplaza las líneas del icono, temperatura y descripcion por esta tarjeta -->
<div class="tarjeta-tiempo">
  <div class="tarjeta-izquierda">
    <img id="icono" src="" alt="icono">
    <div id="descripcion">Cargando...</div>
  </div>
  <div id="temperatura">--°</div>
</div>

    <div class="detalles">
      <div class="detalle"><span>Humedad</span><span id="humedad">--%</span></div>
      <div class="detalle"><span>Viento</span><span id="viento">-- km/h</span></div>
      <div class="detalle"><span>Sensación</span><span id="sensacion">--°</span></div>
      <div class="detalle"><span>Presión</span><span id="presion">-- hPa</span></div>
      <div class="detalle"><span>Polen</span><span id="polen">--</span></div>
      <div class="detalle"><span>UV</span><span id="uv">--</span></div>

    </div>
  </div>

  <div id="ultima-actualizacion">Actualizando...</div>

  <script>
    const API_KEY = '200d7683a1565e363b0b2e6ca5496e01';
    const GOOGLE_KEY = 'AIzaSyAubTqmFTe-pZiyJ61ddvvm8BQGRe0mknY';
    const LAT = 38.91802;
    const LON = -6.34292;
    const URL = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&lang=es&appid=${API_KEY}`;

    function actualizarFondo(condicion, icono) {
      const esNoche = icono.includes('n');
      const id = condicion;
      let gradiente;

      if (esNoche) {
        gradiente = 'linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%)';
      } else if (id >= 200 && id < 300) {
        gradiente = 'linear-gradient(135deg, #1a1a2e 0%, #2d3561 50%, #1a1a2e 100%)';
      } else if (id >= 300 && id < 600) {
        gradiente = 'linear-gradient(135deg, #2c3e50 0%, #3498db 100%)';
      } else if (id >= 600 && id < 700) {
        gradiente = 'linear-gradient(135deg, #e0e0e0 0%, #b0c4de 50%, #a8c0d6 100%)';
      } else if (id >= 700 && id < 800) {
        gradiente = 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)';
      } else if (id === 800) {
        gradiente = 'linear-gradient(135deg, #1a6fa8 0%, #2e9fd4 50%, #87ceeb 100%)';
      } else if (id === 801 || id === 802) {
        gradiente = 'linear-gradient(135deg, #1c3a5e 0%, #4a7fa5 100%)';
      } else {
        gradiente = 'linear-gradient(135deg, #2c3e50 0%, #4a5568 100%)';
      }

      document.body.style.backgroundImage = gradiente;
      document.body.style.transition = 'background-image 2s ease';
    }

    function actualizarReloj() {
      const ahora = new Date();
      document.getElementById('hora').textContent =
        ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fecha').textContent =
        ahora.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    async function obtenerPolen() {
      try {
        const url = `https://pollen.googleapis.com/v1/forecast:lookup?key=${GOOGLE_KEY}&location.longitude=${LON}&location.latitude=${LAT}&days=1`;
        const resp = await fetch(url);
        const datos = await resp.json();
        const tipos = datos.dailyInfo[0].pollenTypeInfo;
        const conDatos = tipos.filter(t => t.indexInfo && t.indexInfo.value > 0);
        if (conDatos.length === 0) {
          document.getElementById('polen').textContent = 'Muy bajo';
          return;
        }
        const maxValor = Math.max(...conDatos.map(t => t.indexInfo.value));
        const categorias = {1: 'Muy bajo', 2: 'Bajo', 3: 'Moderado', 4: 'Alto', 5: 'Muy alto'};
        document.getElementById('polen').textContent = categorias[maxValor] || '--';
      } catch(e) {
        document.getElementById('polen').textContent = 'N/D';
      }
    }

    async function obtenerTiempo() {
      try {
        const respuesta = await fetch(URL);
        const datos = await respuesta.json();

        document.getElementById('temperatura').textContent = Math.round(datos.main.temp) + '°';
        document.getElementById('descripcion').textContent = datos.weather[0].description;
        document.getElementById('humedad').textContent = datos.main.humidity + '%';
        document.getElementById('viento').textContent = Math.round(datos.wind.speed * 3.6) + ' km/h';
        document.getElementById('sensacion').textContent = Math.round(datos.main.feels_like) + '°';
        document.getElementById('presion').textContent = datos.main.pressure + ' hPa';
        document.getElementById('icono').src = `https://openweathermap.org/img/wn/${datos.weather[0].icon}@2x.png`;

        actualizarFondo(datos.weather[0].id, datos.weather[0].icon);

        const ahora = new Date();
        document.getElementById('ultima-actualizacion').textContent =
          'Actualizado: ' + ahora.toLocaleTimeString('es-ES');
      } catch (error) {
        document.getElementById('descripcion').textContent = 'Error de conexión';
      }
    }
async function obtenerUV() {
  try {
    const url = `https://api.openweathermap.org/data/2.5/uvi?lat=${LAT}&lon=${LON}&appid=${API_KEY}`;
    const resp = await fetch(url);
    const datos = await resp.json();
    const valor = datos.value;

    // Etiqueta descriptiva
    let etiqueta;
    if (valor <= 2) etiqueta = 'Bajo';
    else if (valor <= 5) etiqueta = 'Moderado';
    else if (valor <= 7) etiqueta = 'Alto';
    else if (valor <= 10) etiqueta = 'Muy alto';
    else etiqueta = 'Extremo';

    document.getElementById('uv').textContent = `${valor} · ${etiqueta}`;
  } catch(e) {
    document.getElementById('uv').textContent = 'N/D';
  }
}
obtenerUV();
setInterval(obtenerUV, 60 * 60 * 1000); // cada hora

    obtenerTiempo();
    obtenerPolen();
    setInterval(obtenerTiempo, 10 * 60 * 1000);
    setInterval(obtenerPolen, 60 * 60 * 1000);
  </script>

</body>
</html>
